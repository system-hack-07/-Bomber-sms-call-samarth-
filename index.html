<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS/Call Bomber</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }

        .info-text {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            display: none;
            font-size: 14px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .counter {
            text-align: center;
            margin-top: 10px;
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Bomber</h1>
        <p class="subtitle">SMS & Call Bombing Tool</p>

        <form id="bomberForm">
            <div class="form-group">
                <label for="phone">📱 Phone Number</label>
                <input type="text" id="phone" placeholder="+91 or 10 digits" required>
                <p class="info-text">Enter with country code or just digits</p>
            </div>

            <div class="form-group">
                <label for="type">📞 Attack Type</label>
                <select id="type" required>
                    <option value="">-- Select Type --</option>
                    <option value="sms">SMS Bombs</option>
                    <option value="call">Call Bombs</option>
                    <option value="mixed">Mixed (SMS + Calls)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="count">🔁 Number of Requests</label>
                <input type="number" id="count" min="1" max="500" value="10" required>
                <p class="info-text">Max 500 requests per session</p>
            </div>

            <div class="form-group">
                <label for="delay">⏱️ Delay Between Requests (ms)</label>
                <input type="number" id="delay" min="100" max="5000" value="500" required>
                <p class="info-text">Minimum 100ms recommended</p>
            </div>

            <button type="submit">🚀 Start Attack</button>
            <button type="button" id="stopBtn" style="background: #dc3545; display: none;">⛔ Stop Attack</button>
        </form>

        <div id="status" class="status"></div>
        <div id="counter" class="counter"></div>
    </div>

    <script>
        const form = document.getElementById('bomberForm');
        const statusDiv = document.getElementById('status');
        const counterDiv = document.getElementById('counter');
        const stopBtn = document.getElementById('stopBtn');
        let isRunning = false;
        let requestCount = 0;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const phone = document.getElementById('phone').value.trim();
            const type = document.getElementById('type').value;
            const count = parseInt(document.getElementById('count').value);
            const delay = parseInt(document.getElementById('delay').value);

            if (!phone || !type) {
                showStatus('Please fill all fields', 'error');
                return;
            }

            isRunning = true;
            requestCount = 0;
            form.style.opacity = '0.5';
            form.style.pointerEvents = 'none';
            stopBtn.style.display = 'block';

            showStatus(`Starting attack on ${phone}...`, 'loading');

            for (let i = 0; i < count && isRunning; i++) {
                try {
                    const response = await fetch('/api/route', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone, type })
                    });

                    if (response.ok) {
                        requestCount++;
                        counterDiv.textContent = `Requests sent: ${requestCount}/${count}`;
                    } else {
                        console.error('Request failed:', response.status);
                    }
                } catch (error) {
                    console.error('Error:', error);
                }

                if (i < count - 1) {
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }

            isRunning = false;
            form.style.opacity = '1';
            form.style.pointerEvents = 'auto';
            stopBtn.style.display = 'none';

            if (requestCount === count) {
                showStatus(`✅ Attack Complete! ${requestCount} requests sent.`, 'success');
            } else {
                showStatus(`⚠️ Attack Stopped. ${requestCount}/${count} requests sent.`, 'error');
            }
        });

        stopBtn.addEventListener('click', () => {
            isRunning = false;
        });

        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }
    </script>
</body>
</html>
